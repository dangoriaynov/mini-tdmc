apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: postgresinstances.tdmc.tanzu.vmware.com
spec:
  group: tdmc.tanzu.vmware.com
  names:
    kind: PostgresInstance
    listKind: PostgresInstanceList
    plural: postgresinstances
    singular: postgresinstance
    shortNames:
      - pgi
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                serviceType:
                  type: string
                plan:
                  type: string
                instanceId:
                  type: string
              required:
                - name
                - serviceType
                - plan
                - instanceId
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Creating
                    - Ready
                    - Error
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Service
          type: string
          jsonPath: .spec.serviceType
        - name: Plan
          type: string
          jsonPath: .spec.plan
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
