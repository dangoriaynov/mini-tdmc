apiVersion: v1
kind: ServiceAccount
metadata:
  name: connector-sa
  namespace: mini-tdmc-control-plane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: connector-role
rules:
  - apiGroups: ["tdmc.tanzu.vmware.com"]
    resources: ["postgresinstances"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["tdmc.tanzu.vmware.com"]
    resources: ["postgresinstances/status"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: connector-rolebinding
subjects:
  - kind: ServiceAccount
    name: connector-sa
    namespace: mini-tdmc-control-plane
roleRef:
  kind: ClusterRole
  name: connector-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: connector
  namespace: mini-tdmc-control-plane
  labels:
    app: connector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: connector
  template:
    metadata:
      labels:
        app: connector
    spec:
      serviceAccountName: connector-sa
      containers:
        - name: connector
          image: mini-tdmc/connector:latest
          imagePullPolicy: Never
          env:
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq.mini-tdmc-control-plane.svc.cluster.local:5672"
            - name: TARGET_NAMESPACE
              value: "mini-tdmc-data-plane"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
