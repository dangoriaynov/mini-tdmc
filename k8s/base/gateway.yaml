apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: mini-tdmc-control-plane
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: mini-tdmc/gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: INVENTORY_URL
              value: "http://inventory-mini-tdmc-inventory.mini-tdmc-control-plane.svc.cluster.local:4001/graphql"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /graphql?query=%7B__typename%7D
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: mini-tdmc-control-plane
  labels:
    app: gateway
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - port: 4000
      targetPort: 4000
